server:
  port: 20260
spring:
  application:
    name: customer-service
  datasource:
    driver-class-name: org.postgresql.Driver
    username: itpusr
    password: itp@168
    url: jdbc:postgresql://localhost:16851/db_customer
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  profiles:
    active: dev
  config:
    import: optional:configserver:http://localhost:8888
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9090
eureka:
  instance:
    instance-id: ${spring.application.name}
    prefer-ip-address: true

axon:
  axonserver:
    enabled: false
  kafka:
    bootstrap-servers: localhost:29092,localhost:29094,localhost:29096
    default-topic: Axon.CustomerCQRS.Events
    client-id: kafka-axon-customer
    message-converter-mode: default
    properties:
      security.protocol: PLAINTEXT
    publisher:
      confirmation-mode: transactional
    producer:
      transaction-id-prefix: kafka-axon-customer-
      retries: 5
      event-processor-mode: tracking

  serializer:
    general: Jackson
    events: Jackson
    messages: Jackson